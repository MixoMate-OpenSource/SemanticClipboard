name: Release

on:
  push:
    tags:
      - 'v*' # Triggers when a new version tag is pushed, e.g., v0.1.0

jobs:
  release:
    name: Build & Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            formats: deb,appimage,pacman
          - os: macos-latest
            platform: macos
            formats: dmg
          - os: windows-latest
            platform: windows
            formats: wix,nsis

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxtst-dev \
            libxmu-dev \
            xclip \
            xsel \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            pkg-config \
            libfuse2

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Install cargo-packager
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-packager

      - name: Install cargo-generate-rpm (Linux)
        if: matrix.platform == 'linux'
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-generate-rpm

      - name: Build release binary
        run: cargo build --release

      - name: Package RPM (Linux)
        if: matrix.platform == 'linux'
        run: |
          strip -s target/release/SemanticClipboard
          cargo generate-rpm

      - name: Package with cargo-packager
        run: |
          if [ "${{ matrix.platform }}" = "linux" ]; then
            NO_STRIP=true cargo packager --release -f ${{ matrix.formats }}
          else
            cargo packager --release -f ${{ matrix.formats }}
          fi
        shell: bash

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/packages/**/*.deb
            target/packages/**/*.AppImage
            target/packages/**/*.tar.gz
            target/packages/**/*.tar.zst
            target/packages/**/*.dmg
            target/packages/**/*.msi
            target/packages/**/*.exe
            target/generate-rpm/*.rpm
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
