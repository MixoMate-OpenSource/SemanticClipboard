name: Release - Linux

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Package (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxtst-dev \
            libxmu-dev \
            xclip \
            xsel \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            pkg-config \
            libfuse2

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Install cargo-packager
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-packager

      - name: Install cargo-generate-rpm
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-generate-rpm

      - name: Build release binary
        run: cargo build --release

      - name: Package RPM
        run: |
          strip -s target/release/SemanticClipboard
          cargo generate-rpm

      - name: Package with cargo-packager
        run: NO_STRIP=true cargo packager --release -f deb,appimage,pacman

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/packages/**/*.deb
            target/packages/**/*.AppImage
            target/packages/**/*.tar.gz
            target/packages/**/*.tar.zst
            target/generate-rpm/*.rpm
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
